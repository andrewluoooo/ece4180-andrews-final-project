; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = um_tinys3

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1

[env:um_tinys3]
board = um_tinys3
lib_deps = bitbank2/JPEGDEC @ 1.8.4
; Do not link the standalone bbandservo sketch with the main app.
build_src_filter = +<*> -<bbandservo/*>

; Espressif ESP32-C6 (e.g. DevKitC-1). Build: pio run -e esp32c6
[env:esp32c6]
board = esp32-c6-devkitc-1
lib_deps = bitbank2/JPEGDEC @ 1.8.4
build_src_filter = +<*> -<bbandservo/*>

; IR demo sketch under src/bbandservo/ (see comments in that file for target board / pins).
[env:bbandservo]
board = um_tinys3
build_src_filter =
	-<*>
	+<bbandservo/*>

; Refactor app entrypoint under src/refactor/.
; Use: pio run -e refactor
[env:refactor]
board = esp32-c6-devkitc-1
lib_deps = bitbank2/JPEGDEC @ 1.8.4
build_src_filter =
	-<*>
	+<leaderboard.cpp>
	+<refactor/*>

; Ball sensor firmware under src/ball-sensor/.
; Use: pio run -e ball-sensor
[env:ball-sensor]
board = esp32-c6-devkitc-1
build_src_filter =
	-<*>
	+<ball-sensor/*>

; Game controller firmware under src/game-controller/.
; Use: pio run -e game-controller
[env:game-controller]
board = esp32-c6-devkitc-1
lib_deps = bitbank2/JPEGDEC @ 1.8.4
build_src_filter =
	-<*>
	+<leaderboard.cpp>
	+<game-controller/*>
